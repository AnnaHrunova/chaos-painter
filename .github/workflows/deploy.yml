name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build

      - name: Package Pages artifact
        run: |
          tar --directory dist --file "$RUNNER_TEMP/github-pages.tar" --create .
          gzip --force --best "$RUNNER_TEMP/github-pages.tar"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar.gz
          retention-days: 1
          compression-level: 0

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5.0.0
